<header class="site-header" role="banner">
  <div class="site-header__inner container">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="site-brand__name">{{ site.title }}</span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <ul class="site-nav__list">
        {%- assign current = page.url -%}
        {%- for item in site.data.navigation -%}
          {%- assign is_current = false -%}
          {%- if current == item.url -%}{%- assign is_current = true -%}{%- endif -%}
          <li class="site-nav__item">
            <a class="site-nav__link{% if is_current %} is-current{% endif %}"
               href="{{ item.url | relative_url }}"
               {% if is_current %}aria-current="page"{% endif %}>
              {{ item.title }}
            </a>
          </li>
        {%- endfor -%}
      </ul>
    </nav>
  </div>
</header>
