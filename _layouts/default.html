<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  {%- include head.html -%}
</head>
<body>
  {%- if site.github.build_revision -%}
    {%- assign asset_version = site.github.build_revision -%}
  {%- else -%}
    {%- assign asset_version = site.time | date: '%s' -%}
  {%- endif -%}
  <a class="skip-link" href="#main">Skip to content</a>

  {%- include header.html -%}

  <main id="main" tabindex="-1" class="site-main">
    {{ content }}
  </main>

  {%- include footer.html -%}

  <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ asset_version }}" defer></script>
</body>
</html>
