---
layout: default
---
<article class="page container">
  <header class="page__header">
    <h1 class="page__title">{{ page.title }}</h1>
    {%- if page.subtitle -%}
      <p class="page__subtitle">{{ page.subtitle }}</p>
    {%- endif -%}
  </header>

  <div class="page__body{% if page.body_class %} {{ page.body_class }}{% endif %}{% unless page.disable_prose %} prose{% endunless %}">
    {{ content }}
  </div>
</article>
